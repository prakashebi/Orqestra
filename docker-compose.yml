version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: orqestra
      POSTGRES_PASSWORD: orqestra
      POSTGRES_DB: orqestra
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orqestra -d orqestra"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://orqestra:orqestra@db:5432/orqestra
      SECRET_KEY: change-me-in-production
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  # OpenSearch — opt-in via: docker compose --profile opensearch up
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    profiles: ["opensearch"]
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin@Orqestra1
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:9200 -u admin:Admin@Orqestra1 | grep -q opensearch"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  opensearch_data:
