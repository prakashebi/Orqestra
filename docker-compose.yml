version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: orqestra
      POSTGRES_PASSWORD: orqestra
      POSTGRES_DB: orqestra
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://orqestra:orqestra@db:5432/orqestra
      SECRET_KEY: change-me-in-production
      DEBUG: "false"
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:8000/api/v1
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  pg_data:
